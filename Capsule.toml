[package]
name = "astrid-capsule-skills"
version = "0.1.0"
description = "Skills Loader - Reads and loads Agent Skills via VFS"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "skills-loader"
file = "astrid_capsule_skills.wasm"
type = "executable"
# Broad global:// read needed — callers pass arbitrary dir_path (e.g. ".gemini/skills")
# and the capsule scans both workspace and global trees under that path.
capabilities = { fs_read = ["workspace://", "global://"] }

[capabilities]
ipc_publish = []
